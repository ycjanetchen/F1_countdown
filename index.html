<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2026 Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--tc:#e8002d;--bg:#060608}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden}
button,select{cursor:pointer}
.screen{display:none;width:100%;min-height:640px;position:relative;overflow:hidden;flex-direction:column;align-items:center}
.screen.active{display:flex}
canvas.aurora{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.scan{position:absolute;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 6px)}
#s-splash{background:#030305;justify-content:center;align-items:center}
.logo-pill{display:inline-flex;align-items:center;gap:10px;background:#0e0e18;border:1px solid rgba(232,0,45,.45);border-radius:100px;padding:0 18px 0 12px;height:44px;white-space:nowrap;transition:border-color .4s}
.logo-pill.go{border-color:rgba(50,200,80,.5)}
.logo-lights{display:flex;align-items:center;gap:5px}
.ll{width:10px;height:10px;border-radius:50%;background:#1a1a2a;border:1px solid rgba(255,255,255,.1);position:relative;transition:background .12s,border-color .12s,box-shadow .12s}
.ll::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid transparent;opacity:0;pointer-events:none}
.ll.red{background:#E8002D;border-color:#E8002D;box-shadow:0 0 6px 2px rgba(232,0,45,.7)}
.ll.red::after{border-color:#E8002D;animation:p1 .55s ease-out 1 forwards}
.ll.green{background:#32c850;border-color:#32c850;box-shadow:0 0 6px 2px rgba(50,200,80,.7)}
.ll.green::after{border-color:#32c850;animation:p1 .55s ease-out 1 forwards}
@keyframes p1{0%{transform:scale(.7);opacity:.9}100%{transform:scale(2.2);opacity:0}}
.logo-div{width:1px;height:22px;background:rgba(255,255,255,.15);flex-shrink:0;transition:background .4s}
.logo-pill.go .logo-div{background:rgba(50,200,80,.2)}
.logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.1em;font-size:16px;color:#fff;line-height:1}
.logo-year{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:.14em;color:#E8002D;margin-left:2px;line-height:1;transition:color .4s}
.logo-pill.go .logo-year{color:#32c850}
.splash-sub{margin-top:24px;height:32px;overflow:hidden;position:relative;text-align:center;width:100%}
.rot-word{position:absolute;left:0;right:0;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:18px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.7);opacity:0;transform:translateY(100%);transition:opacity .4s ease,transform .4s ease}
.rot-word.in{opacity:1;transform:translateY(0)}
.rot-word.out{opacity:0;transform:translateY(-100%)}
.tap-wrap{margin-top:44px;display:inline-block;border-radius:100px;padding:2px;background:linear-gradient(135deg,#ff0033,#ff6600,#ff0033,#ff6600);background-size:300% 300%;animation:gb-move 2.6s ease infinite;cursor:pointer;box-shadow:0 0 18px rgba(232,0,45,.35),0 0 40px rgba(232,0,45,.12);transition:box-shadow .2s,transform .15s}
.tap-wrap:hover{box-shadow:0 0 28px rgba(232,0,45,.6),0 0 60px rgba(232,0,45,.25);transform:scale(1.05)}
.tap-wrap:active{transform:scale(.97)}
@keyframes gb-move{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.tap-inner{display:inline-flex;align-items:center;gap:10px;padding:13px 32px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:#fff;background:#08080e;border-radius:100px;position:relative;overflow:hidden;pointer-events:none}
.tap-inner::after{content:'';position:absolute;inset:0;background:linear-gradient(-60deg,transparent 38%,rgba(255,255,255,.07) 52%,transparent 68%);background-size:260% 100%;background-position:-100% 0;transition:background-position .7s ease;pointer-events:none}
.tap-wrap:hover .tap-inner::after{background-position:120% 0}
.tap-icon{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(255,255,255,.35);display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
#s-pick{background:var(--bg);justify-content:flex-start}
.ph{position:relative;z-index:20;width:100%;display:flex;flex-direction:column;align-items:center;padding:1.1rem 1rem .5rem;gap:8px}
.ph-logo{display:flex;align-items:center;gap:9px}
.ph-logo-lights{display:flex;gap:4px}
.ph-ll{width:7px;height:7px;border-radius:50%}
.ph-ll.r{background:#E8002D;box-shadow:0 0 4px rgba(232,0,45,.7)}
.ph-ll.g{background:#32c850;box-shadow:0 0 4px rgba(50,200,80,.7)}
.ph-logo-div{width:1px;height:16px;background:rgba(255,255,255,.15)}
.ph-logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;letter-spacing:.1em;color:#fff}
.ph-logo-year{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;color:#E8002D;margin-left:4px}
.pick-hint{font-size:10px;color:#555;font-family:monospace;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.pick-hint-dot{width:5px;height:5px;border-radius:50%;background:#E8002D;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.filter-bar{position:relative;z-index:20;width:100%;padding:.4rem 1rem;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;background:rgba(6,6,8,.85);backdrop-filter:blur(6px)}
.ftab{font-size:10px;font-weight:700;letter-spacing:.07em;padding:4px 10px;border-radius:3px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:#fff!important;-webkit-text-fill-color:#fff!important;cursor:pointer;transition:all .15s;font-family:monospace;text-transform:uppercase;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.ftab:hover{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.12)}
.ftab.on{border-color:var(--tc)!important;background:rgba(232,0,45,.18)!important}
.ftab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.driver-pool{position:relative;z-index:20;width:100%;max-width:820px;padding:.3rem 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:5px;max-height:310px;overflow-y:auto}
.driver-pool::-webkit-scrollbar{width:2px}
.driver-pool::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.dc{position:relative;border-radius:4px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:#0a0a0e;display:flex;flex-direction:column;padding:7px 7px 6px;transition:border-color .14s,transform .14s}
.dc:hover{border-color:rgba(255,255,255,.3);transform:translateY(-3px) scale(1.04)}
.dc:active{transform:scale(.97)}
.dc-glare{position:absolute;inset:0;z-index:2;background:linear-gradient(-45deg,transparent 50%,rgba(255,255,255,.1) 65%,transparent 80%);background-size:300% 300%;background-position:-100% -100%;transition:background-position .45s ease;pointer-events:none}
.dc:hover .dc-glare{background-position:120% 120%}
.dc-gbg{position:absolute;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:16px 16px}
.dc-accent{position:absolute;top:0;left:0;right:0;height:2px;z-index:3}
.dc-body{position:relative;z-index:4;display:flex;flex-direction:column;gap:1px}
.dc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.dc-flag{font-size:13px;line-height:1}
#s-cd{background:var(--bg);justify-content:flex-start}
.hero{position:relative;z-index:20;width:100%;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(6,6,8,.6);backdrop-filter:blur(6px)}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--tc),transparent);opacity:.4}
.hero-inner{display:flex;align-items:center;gap:12px;padding:.9rem 1.4rem;position:relative}
.hero-badge{width:58px;height:58px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,.09);background:#0a0a0e;position:relative;overflow:hidden;font-family:monospace}
.hb-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:11px 11px}
.hb-acc{position:absolute;top:0;left:0;right:0;height:2px}
.hb-num{font-size:20px;font-weight:700;line-height:1;position:relative;z-index:1;color:#fff}
.hb-abbr{font-size:8px;letter-spacing:.12em;color:#aaa;margin-top:2px;position:relative;z-index:1}
.hero-info{flex:1;min-width:0}
.hero-eye{font-size:8px;letter-spacing:.18em;color:var(--tc);text-transform:uppercase;margin-bottom:3px;font-family:monospace}
.hero-name{font-size:clamp(14px,2.8vw,20px);font-weight:700;letter-spacing:.04em;color:#fff;line-height:1.1}
.hero-meta{font-size:10px;color:#888;margin-top:2px;font-family:monospace;display:flex;align-items:center;gap:5px}
.hero-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.hero-stats{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.hs{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:3px;padding:5px 8px;text-align:center;min-width:40px;position:relative;overflow:hidden}
.hs::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--tc);opacity:.4}
.hs-v{font-size:13px;font-weight:700;line-height:1;font-family:monospace;color:#fff}
.hs-l{font-size:7px;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;font-family:monospace}
.change-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,.12);color:#aaa;font-size:9px;letter-spacing:.1em;padding:6px 12px;border-radius:3px;cursor:pointer;transition:all .15s;font-family:monospace;text-transform:uppercase;flex-shrink:0;align-self:flex-start}
.change-btn:hover{color:#fff;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.mini-pick{position:relative;z-index:20;width:100%;max-width:680px;padding:.4rem 1.4rem .5rem;display:none;flex-direction:column;gap:6px;background:rgba(6,6,8,.92);border-bottom:1px solid rgba(255,255,255,.06);backdrop-filter:blur(8px)}
.mini-pick.open{display:flex}
.mini-filter{display:flex;gap:4px;flex-wrap:wrap}
.mftab{font-size:9px;font-weight:700;letter-spacing:.06em;padding:3px 8px;border-radius:3px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff!important;-webkit-text-fill-color:#fff!important;cursor:pointer;font-family:monospace;text-transform:uppercase;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;transition:all .12s}
.mftab:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.1)}
.mftab.on{border-color:var(--tc)!important;background:rgba(232,0,45,.16)!important}
.mftab-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.mini-pool{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:4px;max-height:180px;overflow-y:auto}
.mini-pool::-webkit-scrollbar{width:2px}
.mini-pool::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.mdc{position:relative;border-radius:3px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.07);background:#0a0a0e;padding:5px 6px;transition:border-color .12s,transform .12s}
.mdc:hover{border-color:rgba(255,255,255,.25);transform:scale(1.04)}
.mdc:active{transform:scale(.96)}
.mdc.sel{border-color:var(--tc)!important;box-shadow:0 0 10px -4px var(--tc)}
.mdc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.tz-bar{position:relative;z-index:20;width:100%;max-width:680px;padding:.45rem 1.4rem;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(6,6,8,.55)}
.tz-l{font-size:8px;letter-spacing:.16em;color:#555;text-transform:uppercase;white-space:nowrap;font-family:monospace}
.tz-sel{background:rgba(20,20,30,.9);border:1px solid rgba(255,255,255,.12);color:#ccc;font-size:10px;padding:4px 8px;border-radius:3px;cursor:pointer;flex:1;max-width:240px;font-family:monospace}
.tz-sel option{background:#111;color:#fff}
.tz-now{font-size:9px;color:#555;margin-left:auto;white-space:nowrap;font-family:monospace}
.cd-body{position:relative;z-index:20;width:100%;max-width:680px;padding:.75rem 1.4rem 0}
.slabel{font-size:8px;letter-spacing:.18em;color:#555;text-transform:uppercase;margin-bottom:5px;font-family:monospace;display:flex;align-items:center;gap:5px}
.slabel::before{content:'//';color:var(--tc);opacity:.65}
.race-card{background:rgba(6,6,10,.8);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:.8rem 1rem 1rem;margin-bottom:.7rem;position:relative;overflow:hidden;backdrop-filter:blur(4px)}
.race-card::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--tc);opacity:.55}
.rc-rnd{font-size:8px;letter-spacing:.12em;color:#555;text-transform:uppercase;margin-bottom:3px;font-family:monospace}
.rc-n{font-size:16px;font-weight:700;letter-spacing:.03em;margin-bottom:2px;color:#fff}
.rc-c{font-size:10px;color:#888;margin-bottom:5px;font-family:monospace}
.rc-time{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rc-tl{font-size:12px;font-weight:600;font-family:monospace;color:#ddd}
.rc-tu{font-size:9px;color:#555;font-family:monospace}
.spr-tag{font-size:7px;padding:2px 6px;border-radius:3px;background:rgba(255,160,0,.1);color:#ffa000;border:1px solid rgba(255,160,0,.18);font-weight:700;letter-spacing:.08em;font-family:monospace}
.cd-grid{display:flex;gap:6px;margin-top:.8rem}
.fu{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.fb{width:100%;max-width:82px;aspect-ratio:1/1;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.fb::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:var(--tc);opacity:.5}
.fb::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.4);z-index:1}
.fn{font-size:clamp(18px,4vw,34px);font-weight:700;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums;z-index:2;font-family:monospace;color:#fff}
.fl{font-size:8px;letter-spacing:.12em;color:#555;text-transform:uppercase;font-family:monospace}
.fb.pulse{animation:fp .2s ease}
@keyframes fp{0%{background:rgba(255,255,255,.11)}100%{background:rgba(255,255,255,.04)}}
.race-list-wrap{position:relative;z-index:20;width:100%;max-width:680px;padding:0 1.4rem 1.5rem;overflow-y:auto;max-height:300px}
.race-list-wrap::-webkit-scrollbar{width:3px}
.race-list-wrap::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.race-list-inner{display:flex;flex-direction:column;gap:4px}
.rl-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:6px;cursor:default;opacity:0;transform:scale(.88) translateY(10px);transition:opacity .28s ease,transform .28s ease,background .12s;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.rl-item.visible{opacity:1;transform:scale(1) translateY(0)}
.rl-item:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.09)}
.rl-item.nx{background:rgba(232,0,45,.07);border:1px solid rgba(232,0,45,.2)}
.rn{font-size:10px;color:#3a3a3a;width:20px;text-align:center;font-family:monospace;flex-shrink:0}
.rf{font-size:16px;flex-shrink:0}
.rname{font-size:13px;font-weight:600;color:#ccc;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rdate{font-size:11px;color:#666;white-space:nowrap;font-family:monospace;flex-shrink:0}
.sprint-badge{display:inline-flex;align-items:center;gap:4px;font-size:8px;font-weight:700;letter-spacing:.08em;padding:3px 7px;border-radius:20px;background:rgba(255,160,0,.12);color:#ffa000;border:1px solid rgba(255,160,0,.22);font-family:monospace;white-space:nowrap;flex-shrink:0}
.sprint-badge::before{content:'⚡';font-size:9px}
.tnx{font-size:8px;padding:3px 7px;border-radius:20px;background:rgba(232,0,45,.18);color:#ff6070;font-weight:700;letter-spacing:.07em;font-family:monospace;flex-shrink:0}
#spark-cv{position:absolute;inset:0;pointer-events:none;z-index:50}

/* ── Mobile responsive (≤ 480px) ── */
@media(max-width:480px){
  /* Full viewport height on mobile */
  .screen{min-height:100svh}

  /* Splash button */
  .tap-inner{padding:12px 24px;font-size:14px}

  /* Pick screen header */
  .pick-hint{font-size:11px}

  /* Filter bar — horizontal scroll instead of wrapping */
  .filter-bar{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;padding:.4rem .75rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .ftab{font-size:11px;padding:6px 11px}

  /* Driver card grid — slightly smaller min so 4 cards fit */
  .driver-pool{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));padding:.3rem .75rem;max-height:calc(100svh - 155px)}
  .dc{padding:9px 8px 8px}

  /* Hero section */
  .hero-inner{padding:.75rem 1rem;gap:10px}
  .hero-eye{font-size:10px}
  .hero-meta{font-size:11px}
  .hs-v{font-size:12px}
  .hs-l{font-size:9px}
  .change-btn{font-size:10px;padding:6px 10px}

  /* Mini driver picker — scrollable team tabs */
  .mini-pick{padding:.4rem 1rem .5rem}
  .mini-filter{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .mini-filter::-webkit-scrollbar{display:none}
  .mftab{font-size:10px;padding:5px 9px}

  /* Timezone bar */
  .tz-bar{padding:.4rem 1rem;flex-wrap:wrap;gap:6px}
  .tz-l{font-size:9px}
  .tz-sel{max-width:100%;font-size:12px;padding:5px 8px}
  .tz-now{font-size:10px}

  /* Countdown body */
  .cd-body{padding:.65rem 1rem 0}
  .slabel{font-size:10px}

  /* Race card */
  .race-card{padding:.75rem .875rem .875rem}
  .rc-rnd{font-size:9px}
  .rc-n{font-size:15px}
  .rc-tl{font-size:13px}
  .rc-tu{font-size:10px}
  .spr-tag{font-size:8px;padding:2px 5px}

  /* Countdown digits — bigger on small screens */
  .fn{font-size:clamp(22px,8vw,34px)}
  .fl{font-size:10px}
  .fb{max-width:none}

  /* Upcoming race list */
  .race-list-wrap{padding:0 1rem 1.5rem;max-height:none}
  .rl-item{padding:8px 10px}
  .rname{font-size:12px}
  .rdate{font-size:10px}
  .sprint-badge{display:none}
}
</style>
</head>
<body>
<div id="app">
<div id="s-splash" class="screen active">
  <canvas class="aurora" id="aurora-splash"></canvas>
  <div class="scan"></div>
  <div style="position:relative;z-index:10;display:flex;flex-direction:column;align-items:center">
    <div class="logo-pill" id="logo-pill">
      <div class="logo-lights"><div class="ll" id="sl1"></div><div class="ll" id="sl2"></div><div class="ll" id="sl3"></div><div class="ll" id="sl4"></div><div class="ll" id="sl5"></div></div>
      <div class="logo-div"></div>
      <span class="logo-text">F1 COUNTDOWN</span>
      <span class="logo-year">2026</span>
    </div>
    <div class="splash-sub">
      <div class="rot-word" id="rw0">RACE DAY AWAITS</div>
      <div class="rot-word" id="rw1">LIGHTS OUT</div>
      <div class="rot-word" id="rw2">AND AWAY WE GO</div>
      <div class="rot-word" id="rw3">22 ROUNDS · 11 TEAMS</div>
      <div class="rot-word" id="rw4">SEASON 2026</div>
    </div>
    <div class="tap-wrap" id="tap-wrap" style="display:none" onclick="goToPick()">
      <div class="tap-inner"><span class="tap-icon">›</span>TAP TO CONTINUE</div>
    </div>
  </div>
</div>
<div id="s-pick" class="screen">
  <canvas class="aurora" id="aurora-pick"></canvas>
  <div class="scan"></div>
  <div class="ph">
    <div class="ph-logo">
      <div class="ph-logo-lights"><div class="ph-ll r"></div><div class="ph-ll r"></div><div class="ph-ll r"></div><div class="ph-ll" style="background:#5a0010"></div><div class="ph-ll g"></div></div>

function fmt(date,tz){try{return date.toLocaleString('en-GB',{timeZone:tz,weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return date.toUTCString();}}
function setupCD(){const d=selD,t=d.t;document.getElementById('hb-acc').style.background=t.tc;document.getElementById('hb-num').textContent=d.num;document.getElementById('hb-num').style.color=t.tc;document.getElementById('hb-abbr').textContent=d.abbr;document.getElementById('hero-eye').textContent=`// ${d.abbr} · ${t.n.toUpperCase()}`;document.getElementById('hero-nm').textContent=d.flag+'  '+d.name;document.getElementById('hero-dot').style.background=t.tc;document.getElementById('hero-team').textContent=t.n;document.getElementById('hero-eng').textContent='· '+t.eng;document.querySelectorAll('.fn').forEach(e=>e.style.color=t.tc);document.getElementById('hero-stats').innerHTML=`<div class="hs"><div class="hs-v" style="color:${t.tc}">P${d.pos}</div><div class="hs-l">RANK</div></div><div class="hs"><div class="hs-v" style="color:${t.tc}">${d.pts}</div><div class="hs-l">PTS</div></div><div class="hs"><div class="hs-v" style="color:${t.tc}">${d.wins}</div><div class="hs-l">WINS</div></div><div class="hs"><div class="hs-v" style="color:${t.tc}">${d.poles}</div><div class="hs-l">PP</div></div><div class="hs"><div class="hs-v" style="color:${t.tc}">${d.fl}</div><div class="hs-l">FL</div></div>`;buildTzSel();updateRace();buildAnimatedList();setInterval(()=>{try{document.getElementById('tz-now').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:selTz,hour:'2-digit',minute:'2-digit'});}catch{}},10000);}
function buildTzSel(){const sel=document.getElementById('tz-sel');sel.innerHTML='';const userTz=Intl.DateTimeFormat().resolvedOptions().timeZone,found=TZ_LIST.find(t=>t.tz===userTz);if(!found){const o=document.createElement('option');o.value=userTz;o.textContent='★ '+userTz;o.selected=true;sel.appendChild(o);}TZ_LIST.forEach(t=>{const o=document.createElement('option');o.value=t.tz;o.textContent=t.label;if(t.tz===userTz&&found)o.selected=true;sel.appendChild(o);});selTz=sel.value;try{document.getElementById('tz-now').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:selTz,hour:'2-digit',minute:'2-digit'});}catch{}}
function onTz(){selTz=document.getElementById('tz-sel').value;updateRace();try{document.getElementById('tz-now').textContent=new Date().toLocaleTimeString('en-GB',{timeZone:selTz,hour:'2-digit',minute:'2-digit'});}catch{}}
function updateRace(){const race=getNext();document.getElementById('rc-rnd').textContent=`// RND_${String(race.r).padStart(2,'0')} OF_22 · 2026 FIA F1 WORLD CHAMPIONSHIP`;document.getElementById('rc-n').textContent=race.f+'  '+race.n;document.getElementById('rc-c').textContent=race.c;document.getElementById('rc-tl').textContent=fmt(race.d,selTz);document.getElementById('rc-tu').textContent='('+race.d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' UTC)';document.getElementById('rc-spr').innerHTML=race.s?'<span class="spr-tag">&#9889; SPRINT WEEKEND</span>':'';}
function buildAnimatedList(){const container=document.getElementById('race-list');container.innerHTML='';const now=Date.now(),nextRace=getNext(),wrap=document.getElementById('race-list-wrap');RACES.filter(r=>r.d.getTime()>=now).forEach((race,idx)=>{const isNext=race.r===nextRace.r,ds=fmt(race.d,selTz).split(',').pop().trim();const row=document.createElement('div');row.className='rl-item'+(isNext?' nx':'');row.innerHTML=`<span class="rn">${String(race.r).padStart(2,'0')}</span><span class="rf">${race.f}</span><span class="rname">${race.n}</span>${race.s?'<span class="sprint-badge">SPRINT WEEKEND</span>':''}<span class="rdate">${ds}</span>${isNext?'<span class="tnx">NEXT</span>':''}`;container.appendChild(row);setTimeout(()=>{const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)row.classList.add('visible');else row.classList.remove('visible');});},{threshold:.25,root:wrap});obs.observe(row);const rr=row.getBoundingClientRect(),wr=wrap.getBoundingClientRect();if(rr.top<wr.bottom&&rr.bottom>wr.top)row.classList.add('visible');},idx*55);});}
function startCd(){clearInterval(cdTimer);tick();cdTimer=setInterval(tick,1000);}
function tick(){const race=getNext(),diff=race.d.getTime()-Date.now();if(diff<=0){['d','h','m','s'].forEach(k=>setF(k,'00'));return;}const pad=n=>String(n).padStart(2,'0');setF('d',pad(Math.floor(diff/86400000)));setF('h',pad(Math.floor((diff%86400000)/3600000)));setF('m',pad(Math.floor((diff%3600000)/60000)));const s=Math.floor((diff%60000)/1000);setF('s',pad(s));if(s!==prevSec){doSpark();prevSec=s;}}
function setF(id,v){const el=document.getElementById('fn-'+id);if(el&&el.textContent!==v){el.textContent=v;const b=document.getElementById('fb-'+id);if(b){b.classList.remove('pulse');void b.offsetWidth;b.classList.add('pulse');}}}
function doSpark(){const cv=document.getElementById('spark-cv');if(!cv)return;const app=document.getElementById('app'),g=document.getElementById('fb-s');if(!g)return;const ar=app.getBoundingClientRect(),gr=g.getBoundingClientRect();cv.width=ar.width;cv.height=ar.height;const ctx=cv.getContext('2d');const cx=gr.left-ar.left+gr.width/2,cy=gr.top-ar.top+gr.height/2,col=selD?selD.t.tc:'#e8002d';const N=6,sps=Array.from({length:N},(_,i)=>({x:cx,y:cy,a:(2*Math.PI*i)/N,t:performance.now()}));(function fr(ts){ctx.clearRect(0,0,cv.width,cv.height);const al=sps.filter(sp=>{const p=(ts-sp.t)/300;if(p>=1)return false;const e=p*(2-p),d=e*20,ll=5*(1-e),x1=sp.x+d*Math.cos(sp.a),y1=sp.y+d*Math.sin(sp.a);ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(sp.x+(d+ll)*Math.cos(sp.a),sp.y+(d+ll)*Math.sin(sp.a));ctx.stroke();return true;});if(al.length)requestAnimationFrame(fr);else ctx.clearRect(0,0,cv.width,cv.height);})();}
startAurora('aurora-splash','#3a0010','#060608','#1a0030');
setTimeout(()=>runSplashLights(startRotating),250);
</script>
